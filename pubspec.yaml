name: intercommerce_app
description: InterCommerce - Flutter E-commerce MVP with Clean Architecture
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^14.6.3

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Network
  dio: ^5.8.0+1
  connectivity_plus: ^6.1.4

  # Immutability & JSON
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Images
  cached_network_image: ^3.4.1

  # Local DB (SQLite)
  sqflite: ^2.4.2
  path: ^1.9.1

  # Dependency Injection
  get_it: ^8.0.3

  # UI / Shimmer skeleton
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code generation
  build_runner: ^2.4.14
  freezed: ^3.0.0
  json_serializable: ^6.9.5
  riverpod_generator: ^2.6.5
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
